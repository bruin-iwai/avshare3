on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

# 同時に動くワークフローは1個だけ；先行ワークフローは自動キャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-app
  cancel-in-progress: true

jobs:
  test-result:
    needs: [test, build_and_push]
    if: always() # どちらかのジョブが失敗しても実行する
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set test result
        run: |
          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.build_and_push.result }}" == 'failure' ]]; then
            echo "Test or Build failed"
            exit 1
          else
            echo "All tests passed and build succeeded"
          fi

  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Build api
        run: npm run build -w @avshare3/api
      - name: Build gui
        run: npm run generate -w @avshare3/gui
      - run: npm run format
      - run: npm run lint
      - run: npm run test

  build_and_push:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      # docker 系アクションは github context を直接参照するので checkout 不要だが、
      # sam cli が samconfig.yaml を見つけるために必要なので checkout しておく
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Signin to AWS
      - uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      # Docker build & push
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Generate the ImageUri
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            "${{ steps.login-ecr.outputs.registry }}/bruin-iwai/avshare3-sam"
          tags: |
            type=raw,value={{date 'YYYYMMDD-HHmmss' tz='Asia/Tokyo'}}-{{sha}}
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          provenance: false

      # SAM deploy
      - name: SAM setup
        if: github.event_name != 'pull_request'
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: SAM deploy
        if: github.event_name != 'pull_request'
        env:
          IMAGE_URI: ${{ steps.meta.outputs.tags }}
          FUNCTION_NAME: ${{ secrets.FUNCTION_NAME }}
          REGION: ap-northeast-1
        run: |
          if sam deploy --parameter-overrides "ImageUri=${IMAGE_URI}"; then
            echo "デプロイに成功しました。"
            ./pruneLambdaVersions.sh
          else
            echo "デプロイに失敗しました。"
            exit 1
          fi
