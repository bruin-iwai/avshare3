on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

# 同時に動くワークフローは1個だけ；先行ワークフローは自動キャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-app
  cancel-in-progress: true

jobs:
  test-result:
    needs: [test_build_and_push]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set test result
        run: |
          if [[ "${{ needs.test_build_and_push.result }}" == "failure" ]]; then
            echo "Test or Build failed"
            exit 1
          else
            echo "All tests passed and build succeeded"
          fi

  test_build_and_push:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Build api
        run: npm run build -w @avshare3/api
      - name: Build gui
        run: npm run generate -w @avshare3/gui
      - run: npm run format
      - run: npm run lint
      - run: npm run test

      # Signin to AWS
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1

      - name: SAM build
        run: sam build --use-container

      - name: Copy additional files
        run: |
          # GUI リソースと run.sh は sam build ではコピーされないため、手動でコピーする
          cp -r packages/gui/.output/public .aws-sam/build/MyFunction/public
          cp run.sh .aws-sam/build/MyFunction/

      - name: SAM deploy
        if: github.event_name != 'pull_request'
        env:
          FUNCTION_NAME: ${{ secrets.FUNCTION_NAME }}
          REGION: ap-northeast-1
        run: |
          if sam deploy; then
            echo "デプロイに成功しました。"
            ./pruneLambdaVersions.sh
          else
            echo "デプロイに失敗しました。"
            exit 1
          fi
