AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 29

Parameters:
  CorsEnabled:
    Type: String
    Default: 'true'
  Port:
    Type: Number
    Default: '8080'

Resources:
  MyFunctionDependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Metadata:
      BuildMethod: nodejs24.x
    Properties:
      LayerName: avshare3-api-dependencies-layer
      Description: Layer for MyFunction dependencies
      ContentUri: packages/api/layers/deps
      CompatibleRuntimes:
        - nodejs24.x
  MyFunction:
    Type: AWS::Serverless::Function
    Metadata:
      # Metadata property reference: https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-using-build-typescript.html
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/standalone.ts
        External:
          - '@aws-sdk/*'
          - '@fastify/*'
          - 'fastify'
          - 'http-errors'
          - 'pino'
          - 'typebox'
        Format: esm
        Minify: false
        OutExtension:
          - .js=.mjs
        Target: es2022
    Properties:
      Runtime: nodejs24.x
      CodeUri: packages/api
      Handler: run.sh
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:28
        - !Ref MyFunctionDependenciesLayer
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          RUST_LOG: info
          BUCKET_NAME: '{{resolve:secretsmanager:avshare3/envvars:SecretString:BUCKET_NAME::}}'
          CORS_ENABLED: !Ref CorsEnabled
          PORT: !Ref Port
          GUI_DIST_PATH: ./public
      MemorySize: 1024
      AutoPublishAlias: current
      DeploymentPreference:
        Type: AllAtOnce
    Connectors:
      MyBucketConnector:
        Properties:
          Destination:
            Type: AWS::S3::Bucket
            Arn: 'arn:aws:s3:::{{resolve:secretsmanager:avshare3/envvars:SecretString:BUCKET_NAME::}}'
          Permissions:
            - Read

  # AWS::Serverless::Function の FunctionUrlConfig ではエイリアス (Qualifier) 込みの Function URL を定義できないため
  # 明示的に AWS::Lambda::Url リソースとして宣言する
  MyFunctionCurrentUrlConfig:
    Type: AWS::Lambda::Url
    DependsOn: MyFunctionAliascurrent
    Properties:
      AuthType: AWS_IAM
      Cors:
        AllowOrigins:
          - '*'
      Qualifier: current
      TargetFunctionArn: !GetAtt MyFunction.Arn

  MyFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !GetAtt MyFunctionAliascurrent.AliasArn
      FunctionUrlAuthType: AWS_IAM
      Principal: cloudfront.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: '{{resolve:secretsmanager:avshare3/envvars:SecretString:MyDistributionArn::}}'

  MyFunctionPermission2:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt MyFunctionAliascurrent.AliasArn
      InvokedViaFunctionUrl: true
      Principal: cloudfront.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: '{{resolve:secretsmanager:avshare3/envvars:SecretString:MyDistributionArn::}}'

Outputs:
  MyFunction:
    Description: My Lambda Function ARN
    Value: !GetAtt MyFunction.Arn
  MyFunctionIamRole:
    Description: Implicit IAM Role created for my function
    Value: !GetAtt MyFunctionRole.Arn
  MyFunctionUrl:
    Description: My Lambda Function URL
    Value: !GetAtt MyFunctionCurrentUrlConfig.FunctionUrl
